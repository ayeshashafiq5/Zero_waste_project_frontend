# nginx config for the React/Vite SPA built by the Dockerfile.
# Hashed asset filenames → immutable caching; index.html and the service
# worker must NEVER be cached so users pick up new builds on first navigation.

server {
    listen       80 default_server;
    server_name  _;

    root  /usr/share/nginx/html;
    index index.html;

    # Security headers — kept tight but permissive enough for Supabase,
    # Google Maps, and Vercel previews. Override CSP via env if needed.
    add_header X-Frame-Options           "SAMEORIGIN"      always;
    add_header X-Content-Type-Options    "nosniff"         always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy        "geolocation=(self), camera=(self), microphone=()" always;

    # Gzip — Vite emits a lot of small JS chunks
    gzip on;
    gzip_min_length 256;
    gzip_types
        application/javascript
        application/json
        application/manifest+json
        application/wasm
        text/css
        text/javascript
        text/plain
        image/svg+xml;

    # Health endpoint for container orchestrators
    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok";
    }

    # Service worker must update on every deploy
    location = /sw.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        try_files $uri =404;
    }

    # PWA manifest + entry HTML — no caching
    location ~* ^/(index\.html|manifest\.json|robots\.txt)$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        try_files $uri =404;
    }

    # Hashed static assets — cache aggressively
    location ~* \.(?:js|css|woff2?|ttf|otf|eot|png|jpg|jpeg|gif|webp|avif|svg|ico)$ {
        expires 1y;
        access_log off;
        add_header Cache-Control "public, immutable" always;
        try_files $uri =404;
    }

    # SPA fallback — every unknown path returns index.html so React Router
    # can resolve client-side routes like /restaurant/listings/:id.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
